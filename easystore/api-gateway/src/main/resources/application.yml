spring:
  application:
    name: api-gateway
  cloud:
    gateway:
    consul:
      host: localhost
      port: 8500
      discovery:
        enabled: true
        register: true
        health-check-interval: 10s
        instance-id: ${spring.application.name}:${server.port}
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    gateway:
      enabled: true

server:
  port: 8080
