version: '3.8'

services:
  consul:
    image: hashicorp/consul:1.20
    container_name: easystore-consul
    ports:
      - "8500:8500"   # HTTP API & UI
      - "8600:8600/udp" # DNS
    command: agent -dev -ui -client=0.0.0.0 -bind=0.0.0.0
    environment:
      - CONSUL_BIND_INTERFACE=eth0
    networks:
      - easystore-network
    healthcheck:
      test: ["CMD", "consul", "members"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql:
    image: mysql:8.0
    container_name: easystore-mysql
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=easystore_product
    networks:
      - easystore-network
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

networks:
  easystore-network:
    driver: bridge
