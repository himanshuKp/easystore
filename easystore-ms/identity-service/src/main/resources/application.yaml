server:
  port: 8086

spring:
  application:
    name: identity-service
  datasource:
    url: jdbc:mysql://localhost:3308/easystore_identity?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.MySQLDialect
  cloud:
    consul:
      host: localhost
      port: 8500
      discovery:
        enabled: true
        register: true
        health-check-interval: 10s
        instance-id: ${spring.application.name}:${server.port}
  threads:
    virtual:
      enabled: true

logging:
  level:
    org.springframework.security: DEBUG
